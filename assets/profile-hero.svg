  <g transform="translate(860 96)" opacity="0.95">
    <rect x="0" y="0" width="214" height="214" rx="26" fill="#F8FAF6" fill-opacity="0.08" stroke="#F8FAF6" stroke-opacity="0.15"/>
    <path d="M52 80L84 112L52 144" stroke="#34D399" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M104 150H162" stroke="#F4D35E" stroke-width="12" stroke-linecap="round"/>
    <circle cx="164" cy="58" r="16" fill="#34D399" fill-opacity="0.86"/>
    <circle cx="58" cy="184" r="9" fill="#F4D35E" fill-opacity="0.88"/>
