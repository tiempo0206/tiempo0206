<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tianbo Cao profile hero</title>
  <desc id="desc">A dark green editorial style banner for a computing science student interested in AI tooling and full-stack systems.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07120B"/>
      <stop offset="0.48" stop-color="#102018"/>
      <stop offset="1" stop-color="#1C3A28"/>
    </linearGradient>
    <linearGradient id="accent" x1="116" y1="108" x2="1048" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3A8"/>
      <stop offset="0.56" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F4D35E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 102) rotate(135) scale(360 260)">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020403" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#F7F7F2" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#hero-bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="28" fill="url(#glow)"/>

  <path d="M72 318C190 236 251 340 354 247C464 148 564 205 654 143C761 69 836 91 939 145C1038 197 1082 145 1144 96" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.82"/>
  <path d="M70 352C188 270 266 368 382 281C510 185 590 253 710 176C820 106 912 122 1031 198C1077 227 1119 218 1150 191" stroke="#F7F7F2" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>

  <g filter="url(#soft-shadow)">
    <rect x="72" y="72" width="1056" height="276" rx="24" fill="#08110D" fill-opacity="0.72" stroke="#DDE8D5" stroke-opacity="0.14"/>
  </g>

  <g transform="translate(112 112)">
    <rect x="0" y="0" width="126" height="34" rx="17" fill="#E6FFE9" fill-opacity="0.12" stroke="#8AF0B3" stroke-opacity="0.28"/>
    <circle cx="22" cy="17" r="6" fill="#34D399"/>
    <text x="38" y="22" fill="#E6FFE9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" letter-spacing="0">OPEN TO BUILD</text>

    <text x="0" y="98" fill="#F8FAF6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" letter-spacing="0">Tianbo Cao</text>
    <text x="2" y="142" fill="#B8C8B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" letter-spacing="0">Computing Science student focused on LLMs, full-stack systems, and developer tooling.</text>

    <g transform="translate(0 184)">
      <rect x="0" y="0" width="172" height="44" rx="10" fill="#F8FAF6" fill-opacity="0.08" stroke="#F8FAF6" stroke-opacity="0.12"/>
      <text x="20" y="28" fill="#F8FAF6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" letter-spacing="0">Full-stack Web</text>

      <rect x="190" y="0" width="132" height="44" rx="10" fill="#F8FAF6" fill-opacity="0.08" stroke="#F8FAF6" stroke-opacity="0.12"/>
      <text x="210" y="28" fill="#F8FAF6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" letter-spacing="0">AI Tooling</text>

      <rect x="340" y="0" width="132" height="44" rx="10" fill="#F8FAF6" fill-opacity="0.08" stroke="#F8FAF6" stroke-opacity="0.12"/>
      <text x="360" y="28" fill="#F8FAF6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" letter-spacing="0">MySQL + PHP</text>

      <rect x="490" y="0" width="166" height="44" rx="10" fill="#F8FAF6" fill-opacity="0.08" stroke="#F8FAF6" stroke-opacity="0.12"/>
      <text x="510" y="28" fill="#F8FAF6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" letter-spacing="0">Systems Projects</text>
